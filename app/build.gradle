plugins {
    id 'com.android.application'
}

android {
    namespace 'com.arya.client'
    compileSdk 35

    defaultConfig {
        applicationId 'com.arya.client'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }
}

dependencies {
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}
